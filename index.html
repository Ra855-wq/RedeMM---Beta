
<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RedeMM v3.1 - Surgical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              neutral: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#020617',
              },
              accent: {
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                glow: '#3b82f633'
              }
            },
            animation: {
              'pulse-glow': 'pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 5s ease-in-out infinite',
              'zoom-fade': 'zoom-fade 0.5s ease-out forwards',
            },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { opacity: 1, boxShadow: '0 0 15px #3b82f633' },
                '50%': { opacity: .8, boxShadow: '0 0 30px #3b82f666' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-8px)' },
              },
              'zoom-fade': {
                '0%': { opacity: 0, transform: 'scale(0.98)' },
                '100%': { opacity: 1, transform: 'scale(1)' },
              }
            },
            boxShadow: {
              'surgical': '0 8px 30px rgb(0,0,0,0.04), 0 20px 80px rgb(0,0,0,0.02)',
              'surgical-xl': '0 30px 100px -20px rgba(0,0,0,0.15), 0 10px 40px -10px rgba(0,0,0,0.05)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <style>
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background-color: #f8fafc;
        transition: background-color 0.5s ease;
      }
      .descanso-visao {
        filter: sepia(0.25) contrast(0.95) brightness(0.93);
        background-color: #fdf5e6 !important;
      }
      .descanso-visao * {
        transition: filter 0.5s ease, background-color 0.5s ease;
      }
      .floating-card {
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        border: 1px solid rgba(226, 232, 240, 0.4);
      }
      .floating-card:hover {
        transform: translateY(-4px) scale(1.005);
        border-color: rgba(59, 130, 246, 0.2);
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.08);
      }
      .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .custom-scroll::-webkit-scrollbar { width: 4px; }
      .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 20px; }
      .custom-scroll::-webkit-scrollbar-track { background: transparent; }
      
      .marker-cluster {
        background-clip: padding-box;
        border-radius: 20px;
        backdrop-filter: blur(8px);
      }
      .marker-cluster div {
        width: 30px;
        height: 30px;
        margin-left: 5px;
        margin-top: 5px;
        text-align: center;
        border-radius: 15px;
        font-[Plus Jakarta Sans];
        font-weight: 800;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .marker-cluster-small { background-color: rgba(37, 99, 235, 0.2); border: 2px solid rgba(37, 99, 235, 0.4); }
      .marker-cluster-small div { background-color: #2563eb; }
      .marker-cluster-medium { background-color: rgba(14, 165, 233, 0.2); border: 2px solid rgba(14, 165, 233, 0.4); }
      .marker-cluster-medium div { background-color: #0ea5e9; }
      .marker-cluster-large { background-color: rgba(2, 6, 23, 0.2); border: 2px solid rgba(2, 6, 23, 0.4); }
      .marker-cluster-large div { background-color: #020617; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      @media print {
        .no-print { display: none !important; }
        .printable-area { width: 100% !important; margin: 0 !important; padding: 2cm !important; }
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
